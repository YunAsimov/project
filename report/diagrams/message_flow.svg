<svg width="100%" viewBox="0 0 680 440" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Microsoft YaHei, sans-serif">
<title>消息加密与解密流程</title>
<desc>发送方 AEAD 加密生成 data 帧，服务器不解密转发，接收方按验标签、查重放、输出明文三步处理，非法则丢弃。</desc>

<text x="40" y="32" font-size="18" font-weight="700" fill="#1e293b">消息加密 / 解密流程</text>

<defs>
<marker id="m1" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#475569"/></marker>
<marker id="m2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#dc2626"/></marker>
</defs>

<text x="40" y="62" font-size="13" font-weight="700" fill="#2563eb">发送方 (Alice)</text>
<rect x="40" y="74" width="120" height="50" rx="7" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="100" y="96" font-size="12" fill="#1e3a5f" text-anchor="middle">明文</text>
<text x="100" y="114" font-size="11" fill="#334155" text-anchor="middle">plaintext</text>

<rect x="200" y="68" width="200" height="62" rx="7" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="300" y="90" font-size="12" font-weight="700" fill="#1e3a5f" text-anchor="middle">AEAD 加密</text>
<text x="300" y="108" font-size="10.5" fill="#334155" text-anchor="middle">key=send_key, nonce=counter</text>
<text x="300" y="123" font-size="10.5" fill="#334155" text-anchor="middle">AD = from‖to‖sid‖counter</text>

<rect x="440" y="74" width="200" height="50" rx="7" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="540" y="93" font-size="12" font-weight="700" fill="#1e3a5f" text-anchor="middle">data 帧</text>
<text x="540" y="112" font-size="10.5" fill="#334155" text-anchor="middle">密文 + 标签 + nonce + counter</text>

<line x1="160" y1="99" x2="198" y2="99" stroke="#475569" stroke-width="2" marker-end="url(#m1)"/>
<line x1="400" y1="99" x2="438" y2="99" stroke="#475569" stroke-width="2" marker-end="url(#m1)"/>

<rect x="200" y="158" width="200" height="46" rx="7" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
<text x="300" y="178" font-size="12" font-weight="700" fill="#78350f" text-anchor="middle">服务器：按 to 转发</text>
<text x="300" y="195" font-size="10.5" fill="#334155" text-anchor="middle">不解密，密文原样传递</text>
<line x1="540" y1="124" x2="540" y2="181" stroke="#475569" stroke-width="2"/>
<line x1="540" y1="181" x2="402" y2="181" stroke="#475569" stroke-width="2" marker-end="url(#m1)"/>
<line x1="200" y1="181" x2="120" y2="181" stroke="#475569" stroke-width="2"/>
<line x1="120" y1="181" x2="120" y2="240" stroke="#475569" stroke-width="2" marker-end="url(#m1)"/>

<text x="40" y="232" font-size="13" font-weight="700" fill="#059669">接收方 (Bob) — 顺序严格</text>
<rect x="40" y="246" width="170" height="58" rx="7" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
<text x="125" y="268" font-size="12" font-weight="700" fill="#065f46" text-anchor="middle">① 验证 AEAD 标签</text>
<text x="125" y="286" font-size="10.5" fill="#334155" text-anchor="middle">用 recv_key + 重建 AD</text>
<text x="125" y="300" font-size="10" fill="#64748b" text-anchor="middle">SR2 完整性 / SR3 真实性</text>

<rect x="255" y="246" width="170" height="58" rx="7" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
<text x="340" y="268" font-size="12" font-weight="700" fill="#065f46" text-anchor="middle">② 重放窗口检查</text>
<text x="340" y="286" font-size="10.5" fill="#334155" text-anchor="middle">counter 滑动窗口</text>
<text x="340" y="300" font-size="10" fill="#64748b" text-anchor="middle">SR4 防重放</text>

<rect x="470" y="246" width="170" height="58" rx="7" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="555" y="268" font-size="12" font-weight="700" fill="#1e3a5f" text-anchor="middle">③ 输出明文</text>
<text x="555" y="286" font-size="10.5" fill="#334155" text-anchor="middle">交付应用</text>
<text x="555" y="300" font-size="10" fill="#64748b" text-anchor="middle">SR1 机密性</text>

<line x1="210" y1="275" x2="253" y2="275" stroke="#475569" stroke-width="2" marker-end="url(#m1)"/>
<line x1="425" y1="275" x2="468" y2="275" stroke="#475569" stroke-width="2" marker-end="url(#m1)"/>

<rect x="255" y="350" width="170" height="40" rx="7" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
<text x="340" y="375" font-size="12" font-weight="700" fill="#7f1d1d" text-anchor="middle">丢弃 (拒绝)</text>
<line x1="125" y1="304" x2="125" y2="370" stroke="#dc2626" stroke-width="2"/>
<line x1="125" y1="370" x2="253" y2="370" stroke="#dc2626" stroke-width="2" marker-end="url(#m2)"/>
<text x="135" y="338" font-size="10.5" fill="#7f1d1d">标签无效</text>
<line x1="340" y1="304" x2="340" y2="348" stroke="#dc2626" stroke-width="2" marker-end="url(#m2)"/>
<text x="350" y="324" font-size="10.5" fill="#7f1d1d">重放/越窗</text>

<text x="40" y="418" font-size="11" fill="#64748b">关键顺序：先验标签后查窗口 —— 伪造帧在第①步即被拒，无法污染重放窗口。</text>
</svg>
