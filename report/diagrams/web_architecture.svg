<svg width="100%" viewBox="0 0 680 410" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Microsoft YaHei, sans-serif">
<title>Web 前端架构(方案 B:本地桥接)</title>
<desc>浏览器仅 UI,本地桥接复用 Python 加密代码并作为端点,经中继服务器与对端通信;账号密码存 MySQL 并用 scrypt 哈希。</desc>

<text x="40" y="32" font-size="18" font-weight="700" fill="#1e293b">Web 前端架构(方案 B:本地桥接)</text>

<defs>
<marker id="wa" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#475569"/></marker>
</defs>

<!-- browser -->
<rect x="40" y="70" width="150" height="92" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="115" y="98" font-size="14" font-weight="700" fill="#1e3a5f" text-anchor="middle">浏览器</text>
<text x="115" y="120" font-size="11.5" fill="#334155" text-anchor="middle">纯 UI,无密码学</text>
<text x="115" y="138" font-size="11.5" fill="#334155" text-anchor="middle">不持任何密钥</text>

<!-- bridge (endpoint) -->
<rect x="265" y="60" width="170" height="112" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2.5"/>
<text x="350" y="86" font-size="14" font-weight="700" fill="#065f46" text-anchor="middle">本地桥接(端点)</text>
<text x="350" y="107" font-size="11.5" fill="#334155" text-anchor="middle">复用 client/* 加密代码</text>
<text x="350" y="125" font-size="11.5" fill="#334155" text-anchor="middle">持身份私钥 / 会话密钥</text>
<text x="350" y="143" font-size="11.5" fill="#334155" text-anchor="middle">加解密 / 握手 / 防重放</text>
<text x="350" y="161" font-size="10.5" fill="#059669" text-anchor="middle" font-weight="700">明文只在此与浏览器之间</text>

<!-- relay -->
<rect x="510" y="70" width="130" height="92" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
<text x="575" y="98" font-size="14" font-weight="700" fill="#78350f" text-anchor="middle">中继服务器</text>
<text x="575" y="120" font-size="11.5" fill="#334155" text-anchor="middle">仅转发密文</text>
<text x="575" y="138" font-size="11.5" fill="#334155" text-anchor="middle">+ 路由元数据</text>

<line x1="190" y1="108" x2="263" y2="108" stroke="#475569" stroke-width="2" marker-end="url(#wa)"/>
<line x1="263" y1="124" x2="190" y2="124" stroke="#475569" stroke-width="2" marker-end="url(#wa)"/>
<text x="226" y="100" font-size="10" fill="#64748b" text-anchor="middle">localhost</text>
<text x="226" y="146" font-size="10" fill="#64748b" text-anchor="middle">回环(端点内)</text>

<line x1="435" y1="108" x2="508" y2="108" stroke="#475569" stroke-width="2" marker-end="url(#wa)"/>
<line x1="508" y1="124" x2="435" y2="124" stroke="#475569" stroke-width="2" marker-end="url(#wa)"/>
<text x="471" y="146" font-size="10" fill="#64748b" text-anchor="middle">仅密文(WS)</text>

<!-- peer -->
<rect x="510" y="210" width="130" height="62" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="575" y="237" font-size="13" font-weight="700" fill="#1e3a5f" text-anchor="middle">对端</text>
<text x="575" y="256" font-size="11" fill="#334155" text-anchor="middle">网页桥接 / CLI</text>
<line x1="575" y1="162" x2="575" y2="208" stroke="#475569" stroke-width="2" marker-end="url(#wa)"/>

<!-- MySQL cylinder -->
<g transform="translate(285,210)">
  <ellipse cx="65" cy="14" rx="65" ry="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <path d="M0 14 V58 A65 14 0 0 0 130 58 V14" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <ellipse cx="65" cy="14" rx="65" ry="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="65" y="40" font-size="13" font-weight="700" fill="#1e3a5f" text-anchor="middle">MySQL</text>
  <text x="65" y="58" font-size="10.5" fill="#334155" text-anchor="middle">账号 + scrypt 哈希</text>
</g>
<line x1="350" y1="172" x2="350" y2="208" stroke="#475569" stroke-width="2" marker-end="url(#wa)"/>
<text x="358" y="194" font-size="10" fill="#64748b">注册/登录校验</text>

<rect x="40" y="300" width="600" height="78" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="52" y="322" font-size="12.5" fill="#1e293b" font-weight="700">为什么 E2EE 不受影响:</text>
<text x="52" y="342" font-size="11.5" fill="#334155">• 端点 = 用户本机的桥接进程;明文仅存于「浏览器 + 本地桥接」,二者同机、同一信任边界。</text>
<text x="52" y="360" font-size="11.5" fill="#334155">• 中继服务器始终只见密文;浏览器↔桥接走 localhost 回环,属端点设备内部通信。</text>
</svg>
